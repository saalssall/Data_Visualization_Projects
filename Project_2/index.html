<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project 2 — Data Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: #0f0f13;
        color: #e8e8f0;
        min-height: 100vh;
        line-height: 1.6;
    }

    header {
        padding: 72px 40px 40px;
        text-align: center;
        border-bottom: 1px solid #1e1e2e;
    }

    .badge {
        display: inline-block;
        background: #1a1a28;
        border: 1px solid #2a2a3e;
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.78rem;
        color: #AFA9EC;
        margin-bottom: 16px;
    }

    h1 {
        font-size: 2rem;
        font-weight: 600;
        color: #f0f0fa;
        margin-bottom: 10px;
    }

    header p {
        color: #888899;
        max-width: 600px;
        margin: 0 auto;
    }

    main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 60px 40px;
    }

    .section-label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #534AB7;
        margin-bottom: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
        margin-bottom: 40px;
    }

    .card {
        background: #13131f;
        border: 1px solid #1e1e2e;
        border-radius: 12px;
        padding: 20px;
        transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
        border-color: #534AB7;
        background: #16162a;
    }

    .card h3 {
        font-size: 1rem;
        margin-bottom: 10px;
        color: #e8e8f0;
    }

    canvas {
        width: 100% !important;
        height: 260px !important;
    }

    footer {
        border-top: 1px solid #1e1e2e;
        padding: 24px 40px;
        text-align: center;
        font-size: 0.8rem;
        color: #444455;
    }

    a.back {
        display: inline-block;
        margin-top: 20px;
        color: #AFA9EC;
        text-decoration: none;
        font-size: 0.85rem;
    }

    a.back:hover {
        color: #534AB7;
    }
</style>
</head>

<body>

<header>
    <div class="badge">Project 02</div>
    <h1>Interactive Data Dashboard</h1>
    <p>Visual analysis of dataset trends using JavaScript, Chart.js, and CSV processing.</p>
</header>

<main>

    <div class="section-label">Visual Insights</div>

    <div class="grid">
        <div class="card">
            <h3>Deaths by Year</h3>
            <canvas id="yearChart"></canvas>
        </div>

        <div class="card">
            <h3>Deaths by Month</h3>
            <canvas id="monthChart"></canvas>
        </div>

        <div class="card">
            <h3>Deaths by Sex</h3>
            <canvas id="sexChart"></canvas>
        </div>
    </div>

    <a class="back" href="../index.html">← Back to Projects</a>

</main>

<footer>
    &copy; 2026 Data Visualization Project
</footer>

<script>
function loadCSV() {
    Papa.parse("Data/death_data.csv", {
        download: true,
        header: true,
        complete: function(results) {
            processData(results.data);
        }
    });
}

function processData(data) {

    const yearCount = {};
    const monthCount = {};
    const sexCount = {};

    data.forEach(row => {
        const year = row.year || row.Year;
        const month = row.month || row.Month;
        const sex = row.sex || row.Sex;

        if (year) yearCount[year] = (yearCount[year] || 0) + 1;
        if (month) monthCount[month] = (monthCount[month] || 0) + 1;
        if (sex) sexCount[sex] = (sexCount[sex] || 0) + 1;
    });

    createChart("yearChart", "bar", yearCount);
    createChart("monthChart", "bar", monthCount);
    createChart("sexChart", "pie", sexCount);
}

function createChart(id, type, dataObj) {
    const ctx = document.getElementById(id).getContext("2d");

    new Chart(ctx, {
        type: type,
        data: {
            labels: Object.keys(dataObj),
            datasets: [{
                data: Object.values(dataObj),
                backgroundColor: [
                    "#534AB7", "#7A6FF0", "#9B8CFF",
                    "#3E3E55", "#6C63FF", "#AFA9EC"
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: {
                        color: "#e8e8f0"
                    }
                }
            }
        }
    });
}

loadCSV();
</script>

</body>
</html>
