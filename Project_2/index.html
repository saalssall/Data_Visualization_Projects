<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project 2 — Data Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PapaParse (for CSV loading) -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f6fa;
      color: #222;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      width: 95%;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    canvas {
      max-width: 100%;
    }
  </style>
</head>

<body>

<header>
  <h1>Gun Deaths in the US — Data Dashboard</h1>
  <p>Interactive analysis using CSV data</p>
</header>

<div class="container">

  <div class="grid">

    <div class="card">
      <h3>Deaths by Year</h3>
      <canvas id="yearChart"></canvas>
    </div>

    <div class="card">
      <h3>Deaths by Month</h3>
      <canvas id="monthChart"></canvas>
    </div>

    <div class="card">
      <h3>Deaths by Sex</h3>
      <canvas id="sexChart"></canvas>
    </div>

  </div>

</div>

<script>
let rawData = [];

function loadCSV() {
  Papa.parse("/Data/death_data.csv", {
    download: true,
    header: true,
    complete: function(results) {
      rawData = results.data;
      processData(rawData);
    }
  });
}

function processData(data) {

  // Adjust these column names if your CSV differs
  const yearCount = {};
  const monthCount = {};
  const sexCount = {};

  data.forEach(row => {
    const year = row.year || row.Year;
    const month = row.month || row.Month;
    const sex = row.sex || row.Sex;

    if (year) yearCount[year] = (yearCount[year] || 0) + 1;
    if (month) monthCount[month] = (monthCount[month] || 0) + 1;
    if (sex) sexCount[sex] = (sexCount[sex] || 0) + 1;
  });

  createChart("yearChart", "bar", yearCount, "Year");
  createChart("monthChart", "bar", monthCount, "Month");
  createChart("sexChart", "pie", sexCount, "Sex");
}

function createChart(id, type, dataObj, label) {
  const ctx = document.getElementById(id).getContext("2d");

  new Chart(ctx, {
    type: type,
    data: {
      labels: Object.keys(dataObj),
      datasets: [{
        label: label,
        data: Object.values(dataObj),
        backgroundColor: [
          "#3498db", "#e74c3c", "#2ecc71",
          "#f1c40f", "#9b59b6", "#1abc9c"
        ]
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true }
      }
    }
  });
}

loadCSV();
</script>

</body>
</html>
