name: Hint Page Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate-hint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo structure (debug)
        run: ls -R

      - name: Check hint.html inside workflows folder
        run: |
          FILE=".github/workflows/hint.html"

          if [ -f "$FILE" ]; then
            echo "hint.html found inside .github/workflows"
          else
            echo "hint.html missing at $FILE"
            exit 1
          fi

      - name: Validate HTML structure
        run: |
          grep -q "<html" .github/workflows/hint.html
          grep -q "</html>" .github/workflows/hint.html
          echo "HTML structure OK"